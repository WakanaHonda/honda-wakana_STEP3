<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8"> 
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>TNG CAFE</title>
        <link rel="stylesheet" href="test.css">
    </head>
    <body>
        <!---header--->
        <header>
            <h1>TNG CAFE</h1>
            <div>心安らぐ一杯をあなたに</div>
            <nav class="nav">
                <ul class="nav-list">
                    <li class="nav-item"><a href="#about">About Us</a></li>
                    <li class="nav-item"><a href="#menu">Menu</a></li>
                    <li class="nav-item"><a href="#contact">Contact</a></li>
                </ul>
            </nav>
        </header>
        <!--main-->
        <main>
            <section id="about">
                <h2 class="section-title">About Us</h2>
                <p>TNGCafeは自然の空間に包まれたリラックス空間を提供しています。<br>
                自家焙煎コーヒーと手作りスイーツで、穏やかな空間をお過ごしください。
                </p>
                <img src="Image.png" alt="カフェの写真">
            </section>
            <section id="menu">
                <h2 class="section-title">Menu</h2>
                <ul class="menu-list">
                    <li class="menu-item">
                        <img src="coffee.jpg" alt="コーヒー">
                        <div>ブレンドコーヒー</div>
                    </li>
                    <li class="menu-item">
                        <img src="cake.jpg" alt="ケーキ">
                        <div>ベイクドチーズケーキ</div>
                    </li>
                    <li class="menu-item">
                        <img src="late.jpg" alt="ラテ">
                        <div>カフェラテ</div>
                    </li>
                </ul>
            </section>
            <!--contact-->
            <section id="contact">
                <h2 class="section-title">Contact</h2>
                <form action="#" class="contact-form">
                    <div class="contact-form-item">
                        <label for="name">お名前：</label>
                        <input type="text" id="name" name="name">
                    </div>
                    <div class="contact-form-item">
                        <label for="name">メールアドレス：</label>
                        <input type="email" id="email" name="email">   
                    </div>
                    <div class="contact-form-item">
                        <label for="name">お問い合わせ内容：</label>
                        <textarea id="message" name="message"></textarea>
                    </div>
                    <button type="submit" class="contact-for-button">送信</botton>
                </form>
            </section>
        </main>
        <!--footer-->
        <footer>
            <p>© 2000 TNG Cafe</p>
        </footer>
    </body>
</html>
